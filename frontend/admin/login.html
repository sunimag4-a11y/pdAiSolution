<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login | AI-Solutions</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="login-pg">
  <div class="card login-card reveal">
    <div class="login-logo"><a href="../index.html" class="logo">AI<svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 3 14h7l-1 8 11-12h-7l1-8Z"/></svg>Solutions</a></div>
    <h2 class="login-h">Admin Login</h2>
    <p class="login-sub">Secure access for authorised team members only.</p>
    <!-- <p class="login-note" style="font-size:.95rem;color:var(--muted);margin:.75rem 0 0;line-height:1.5;max-width:32rem;">
      First use Google sign-in to receive a temporary password by email. Then sign in with your email and temporary password below.
    </p> -->

    <div class="login-provider" style="display:flex;flex-direction:column;gap:1rem;">
      <!-- <div style="font-size:.92rem;color:var(--muted);text-align:left;">
        First-time admins: click Google sign-in to request a temporary password. The email/password form will appear once your temporary password has been sent.
      </div> -->
      <button id="googleSignInBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:.95rem 1rem;margin-top:.5rem;display:flex;align-items:center;justify-content:center;gap:.75rem">
        <svg class="inline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8.34a8.5 8.5 0 00-.48-2.68H12v4.93h4.63c-.2 1.16-.8 2.15-1.7 2.82v2.34h2.75c1.6-1.48 2.52-3.64 2.52-6.41z"/><path d="M12 22c2.43 0 4.47-.8 5.96-2.18l-2.75-2.34c-.76.51-1.73.81-3.21.81-2.46 0-4.53-1.66-5.27-3.9H3.92v2.45C5.4 19.9 8.45 22 12 22z"/><path d="M6.73 13.39a5.39 5.39 0 010-3.8V7.14H3.92a8.98 8.98 0 000 9.72l2.81-2.47z"/><path d="M12 6.5c1.32 0 2.5.45 3.43 1.33l2.58-2.58C16.46 3.7 14.43 3 12 3 8.45 3 5.4 4.1 3.92 6.14l2.81 2.45C7.47 8.16 9.54 6.5 12 6.5z"/></svg>
        Continue with Google
      </button>
      <div id="loginStatus" class="fmsg" style="display:none;text-align:center;margin-top:.75rem;color:var(--text);font-size:.95rem;line-height:1.4;"></div>
      <form id="passwordLoginForm" style="display:none;flex-direction:column;gap:1rem;margin-top:.5rem;">
        <div id="passwordLoginInfo" style="font-size:.92rem;color:var(--muted);text-align:left;">
          Enter your email and the temporary password sent to your inbox after Google sign-in.
        </div>
        <div>
          <label for="adminEmail" style="display:block;margin-bottom:.35rem;color:var(--muted)">Email</label>
          <input id="adminEmail" type="email" placeholder="admin@example.com" style="width:100%;padding:.85rem 1rem;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);" required />
        </div>
        <div>
          <label for="adminPassword" style="display:block;margin-bottom:.35rem;color:var(--muted)">Temporary password</label>
          <input id="adminPassword" type="password" placeholder="Enter temporary password" style="width:100%;padding:.85rem 1rem;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);" required />
        </div>
        <button type="submit" class="btn btn-outline" style="width:100%;justify-content:center;padding:.95rem 1rem">Login with password</button>
      </form>
      <div id="loginError" class="ferr" style="display:none; text-align:center; margin-top:0;"></div>
    </div>

    <div style="text-align:center;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)">
      <a href="../index.html" style="font-size:.82rem;color:var(--muted)"><svg class="inline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 6l-6 6 6 6"/></svg> Back to website</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
